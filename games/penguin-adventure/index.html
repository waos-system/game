<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🐧 Penguin Platformer — Arctic Adventure</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#020810;font-family:'Courier New',monospace;}
body{display:flex;align-items:center;justify-content:center;}
#wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;}
canvas{display:block;image-rendering:pixelated;}
#hint{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);color:#1e3a5f;font-size:11px;letter-spacing:1px;white-space:nowrap;}

/* ── Overlay control layer ── */
#ctrl{position:absolute;inset:0;pointer-events:none;touch-action:none;}

/* ── Virtual Joystick (left) ── */
#stick-zone{
  position:absolute;left:18px;bottom:18px;
  width:148px;height:148px;
  pointer-events:all;touch-action:none;
  display:none;
}
#stick-base{
  position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 40% 35%, rgba(80,140,220,0.18) 0%, rgba(30,60,120,0.28) 100%);
  border:2px solid rgba(100,170,255,0.30);
  box-shadow:0 0 22px rgba(60,120,255,0.15) inset,0 0 10px rgba(60,120,255,0.10);
}
/* Direction tickmarks */
#stick-base::before{
  content:'';position:absolute;inset:6px;border-radius:50%;
  border:1px dashed rgba(100,170,255,0.18);
}
#stick-knob{
  position:absolute;
  width:62px;height:62px;
  top:50%;left:50%;
  margin:-31px 0 0 -31px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%, rgba(160,210,255,0.75) 0%, rgba(60,130,220,0.60) 60%, rgba(30,80,180,0.45) 100%);
  border:2px solid rgba(140,200,255,0.70);
  box-shadow:0 0 18px rgba(80,160,255,0.50),0 2px 6px rgba(0,0,0,0.4);
  will-change:transform;
  transform:translate(0,0);
  transition:box-shadow 0.1s;
}
#stick-knob.active{box-shadow:0 0 28px rgba(100,200,255,0.80),0 2px 6px rgba(0,0,0,0.4);}
/* inner highlight dot */
#stick-knob::after{
  content:'';position:absolute;
  width:18px;height:10px;top:11px;left:12px;
  border-radius:50%;
  background:rgba(255,255,255,0.38);
}
/* faint arrow guides */
.s-arr{
  position:absolute;color:rgba(120,180,255,0.35);
  font-size:14px;line-height:1;pointer-events:none;user-select:none;
}
.s-arr.u{top:6px;left:50%;transform:translateX(-50%);}
.s-arr.d{bottom:6px;left:50%;transform:translateX(-50%);}
.s-arr.l{left:7px;top:50%;transform:translateY(-50%);}
.s-arr.r{right:7px;top:50%;transform:translateY(-50%);}

/* ── Action buttons (right) ── */
#btn-zone{
  position:absolute;right:18px;bottom:18px;
  display:none;flex-direction:column;align-items:center;
  gap:14px;pointer-events:all;touch-action:none;
}
.act-btn{
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  user-select:none;-webkit-user-select:none;touch-action:none;cursor:pointer;
  transition:transform 0.06s,box-shadow 0.06s;
  position:relative;
}
.act-btn:active,.act-btn.pressed{transform:scale(0.92);}
#btn-jump{
  width:74px;height:74px;
  background:radial-gradient(circle at 38% 32%, rgba(120,200,255,0.55) 0%, rgba(40,110,220,0.40) 100%);
  border:2.5px solid rgba(100,180,255,0.70);
  box-shadow:0 0 20px rgba(80,160,255,0.40),0 3px 8px rgba(0,0,0,0.45);
  font-family:'Courier New',monospace;font-weight:900;font-size:11px;
  color:rgba(200,235,255,0.92);letter-spacing:1px;flex-direction:column;gap:2px;
}
#btn-jump::after{content:'▲';font-size:20px;display:block;line-height:1;}
#btn-attack{
  width:62px;height:62px;
  background:radial-gradient(circle at 38% 32%, rgba(255,160,80,0.55) 0%, rgba(200,80,20,0.40) 100%);
  border:2.5px solid rgba(255,140,60,0.70);
  box-shadow:0 0 18px rgba(255,120,40,0.40),0 3px 8px rgba(0,0,0,0.45);
  font-size:26px;
}
.act-btn.pressed{box-shadow:0 0 8px rgba(255,255,255,0.2);}

/* ── Portrait rotation warning ── */
#portrait-warn{
  display:none;position:fixed;inset:0;z-index:9999;
  background:#020810;color:#60aaff;
  align-items:center;justify-content:center;flex-direction:column;gap:18px;
  font-family:'Courier New',monospace;font-size:17px;text-align:center;padding:24px;
}
#portrait-warn .icon{font-size:52px;animation:rot 1.8s ease-in-out infinite alternate;}
@keyframes rot{from{transform:rotate(-25deg)}to{transform:rotate(25deg)}}

/* ── Responsive show/hide ── */
@media(pointer:coarse){
  #stick-zone{display:block;}
  #btn-zone{display:flex;}
  #hint{display:none;}
}
@media(pointer:coarse) and (orientation:portrait){
  #portrait-warn{display:flex;}
}
</style>
</head>
<body>
<!-- Portrait warning -->
<div id="portrait-warn">
  <div class="icon">📱</div>
  <div>スマホを横向きにしてください<br><span style="font-size:13px;color:#3a6a9a">Rotate to landscape to play</span></div>
</div>

<!-- Game wrapper -->
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="hint">← → 移動 | ↑/Space ジャンプ（2段可） | ↓ スライディング | Z 魚投げ | R リスタート</div>

  <!-- Control overlay -->
  <div id="ctrl">
    <!-- LEFT: Analog Joystick -->
    <div id="stick-zone">
      <div id="stick-base">
        <span class="s-arr u">▲</span>
        <span class="s-arr d">▼</span>
        <span class="s-arr l">◀</span>
        <span class="s-arr r">▶</span>
        <div id="stick-knob"></div>
      </div>
    </div>

    <!-- RIGHT: Action buttons -->
    <div id="btn-zone">
      <div class="act-btn" id="btn-jump">JUMP</div>
      <div class="act-btn" id="btn-attack">🐟</div>
    </div>
  </div>
</div>
<script>
// ════════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════════
const W=800,H=450,T=32,ROWS=14;
const GRAV=0.58,JFORCE=-13.5,J2FORCE=-11.5,MSPD=4.2,ICE_F=0.994,GND_F=0.68;
const SEC_W=88;
const COIN_1UP=100;
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
canvas.width=W;canvas.height=H;
// Landscape-aware resize: canvas fills the window, controls overlay on top
function resize(){
  const vw=window.innerWidth,vh=window.innerHeight;
  const s=Math.min(vw/W,vh/H);
  canvas.style.width=W*s+'px';canvas.style.height=H*s+'px';
}
resize();addEventListener('resize',resize);

// ════════════════════════════════════════════════
//  AUDIO ENGINE
// ════════════════════════════════════════════════
let AC=null;
const getAC=()=>{if(!AC){AC=new(window.AudioContext||window.webkitAudioContext)();}return AC;};

function beep(f,d,t='square',v=0.12,sl=0.5,dl=0){
  try{const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);o.type=t;
  const n=ac.currentTime+dl;
  o.frequency.setValueAtTime(f,n);o.frequency.exponentialRampToValueAtTime(f*sl,n+d);
  g.gain.setValueAtTime(v,n);g.gain.exponentialRampToValueAtTime(0.001,n+d);
  o.start(n);o.stop(n+d);}catch(e){}
}

const SFX={
  jump:   ()=>beep(340,0.13,'square',0.09,0.6),
  jump2:  ()=>beep(520,0.13,'square',0.09,0.7),
  coin:   ()=>{beep(900,0.07,'sine',0.11);beep(1200,0.10,'sine',0.09,1,0.07);},
  hurt:   ()=>beep(130,0.38,'sawtooth',0.13,0.35),
  kill:   ()=>{beep(280,0.07,'square',0.09);beep(420,0.07,'square',0.08,1,0.07);beep(600,0.11,'square',0.08,1,0.14);},
  slide:  ()=>beep(190,0.18,'sawtooth',0.07,0.8),
  goal:   ()=>{[523,659,784,1047,1319,1568].forEach((f,i)=>beep(f,0.25,'sine',0.13,1,i*0.12));},
  star:   ()=>{beep(800,0.05,'sine',0.09);beep(1000,0.05,'sine',0.09,1,0.06);beep(1400,0.07,'sine',0.09,1,0.12);},
  warp:   ()=>{for(let i=0;i<8;i++)beep(300+i*80,0.1,'sine',0.08,1,i*0.04);},
  oneup:  ()=>{[523,659,784,1047,784,1047,1319].forEach((f,i)=>beep(f,0.14,'sine',0.12,1,i*0.1));},
  throw:  ()=>beep(280,0.09,'square',0.09,1.2),
  powerup:()=>{[330,415,523,659,784,1047].forEach((f,i)=>beep(f,0.18,'sine',0.12,1,i*0.08));},
  revert: ()=>{[1047,784,523,330].forEach((f,i)=>beep(f,0.12,'sawtooth',0.10,0.7,i*0.07));},
  bonus:  ()=>{for(let i=0;i<5;i++)beep(600+i*100,0.08,'sine',0.09,1,i*0.06);},
};

// ════════════════════════════════════════════════
//  BGM — Chiptune Arctic Melody (Web Audio sequencer)
// ════════════════════════════════════════════════
// Note frequencies
const N={
  C3:131,D3:147,E3:165,F3:175,G3:196,A3:220,B3:247,
  C4:262,D4:294,E4:330,F4:349,G4:392,A4:440,B4:494,
  C5:523,D5:587,E5:659,F5:698,G5:784,A5:880,B5:988,C6:1047,
  _:0 // rest
};
// BPM=128  →  one beat = 60/128 ≈ 0.469s, one 16th = 0.117s
const BPM=128, BEAT=60/BPM, S16=BEAT/4;

// Melody (16th notes × 64 steps = 4 bars)
const MELODY=[
  N.E5,N._,N.G5,N._,N.A5,N._,N.G5,N._,  N.E5,N._,N.C5,N._,N.D5,N._,N._,N._,
  N.G5,N._,N.F5,N._,N.E5,N._,N.D5,N._,  N.C5,N._,N.E5,N._,N.G5,N._,N._,N._,
  N.A5,N._,N.G5,N._,N.E5,N._,N.G5,N._,  N.A5,N._,N.C6,N._,N.B5,N._,N.A5,N._,
  N.G5,N._,N.E5,N._,N.D5,N._,N.E5,N._,  N.C5,N._,N._,N._,N.G4,N._,N._,N._,
];
// Bass (same 64 steps)
const BASS=[
  N.C3,N._,N._,N._,N.C3,N._,N._,N._,  N.A3,N._,N._,N._,N.A3,N._,N._,N._,
  N.G3,N._,N._,N._,N.G3,N._,N._,N._,  N.F3,N._,N._,N._,N.F3,N._,N._,N._,
  N.A3,N._,N._,N._,N.A3,N._,N._,N._,  N.C4,N._,N._,N._,N.C4,N._,N._,N._,
  N.G3,N._,N._,N._,N.G3,N._,N._,N._,  N.C3,N._,N._,N._,N.C3,N._,N._,N._,
];
// Harmony/arpeggio
const HARM=[
  N.C4,N.E4,N.G4,N.E4,N.C4,N.E4,N.G4,N.E4,  N.A3,N.C4,N.E4,N.C4,N.A3,N.C4,N.E4,N.C4,
  N.G3,N.B3,N.D4,N.B3,N.G3,N.B3,N.D4,N.B3,  N.F3,N.A3,N.C4,N.A3,N.F3,N.A3,N.C4,N.A3,
  N.A3,N.C4,N.E4,N.C4,N.A3,N.C4,N.E4,N.C4,  N.C4,N.E4,N.G4,N.E4,N.C4,N.E4,N.G4,N.E4,
  N.G3,N.B3,N.D4,N.B3,N.G3,N.B3,N.D4,N.B3,  N.C3,N.E3,N.G3,N.E3,N.C3,N.E3,N.G3,N.E3,
];

let bgmPlaying=false,bgmNextTime=0,bgmStep=0,bgmMasterGain=null;
function bgmInit(){
  try{
    const ac=getAC();
    bgmMasterGain=ac.createGain();
    bgmMasterGain.gain.setValueAtTime(0.18,ac.currentTime);
    bgmMasterGain.connect(ac.destination);
    bgmPlaying=true;bgmStep=0;bgmNextTime=ac.currentTime+0.05;
    bgmSchedule();
  }catch(e){}
}
function bgmSchedule(){
  if(!bgmPlaying||!bgmMasterGain)return;
  try{
    const ac=getAC();const LOOK=0.3;
    while(bgmNextTime<ac.currentTime+LOOK){
      const i=bgmStep%MELODY.length;
      const t=bgmNextTime;
      // Melody — triangle wave
      if(MELODY[i]>0){
        const o=ac.createOscillator(),g=ac.createGain();
        o.connect(g);g.connect(bgmMasterGain);
        o.type='triangle';o.frequency.value=MELODY[i];
        g.gain.setValueAtTime(0.55,t);g.gain.exponentialRampToValueAtTime(0.001,t+S16*1.8);
        o.start(t);o.stop(t+S16*2);
      }
      // Bass — square wave
      if(BASS[i]>0){
        const o=ac.createOscillator(),g=ac.createGain();
        o.connect(g);g.connect(bgmMasterGain);
        o.type='square';o.frequency.value=BASS[i];
        g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+S16*3.8);
        o.start(t);o.stop(t+S16*4);
      }
      // Harmony — sine wave
      if(HARM[i]>0){
        const o=ac.createOscillator(),g=ac.createGain();
        o.connect(g);g.connect(bgmMasterGain);
        o.type='sine';o.frequency.value=HARM[i];
        g.gain.setValueAtTime(0.22,t);g.gain.exponentialRampToValueAtTime(0.001,t+S16*1.2);
        o.start(t);o.stop(t+S16*1.5);
      }
      bgmNextTime+=S16;bgmStep++;
    }
    setTimeout(bgmSchedule,100);
  }catch(e){}
}
function bgmStop(){
  bgmPlaying=false;
  if(bgmMasterGain){try{bgmMasterGain.gain.setTargetAtTime(0,getAC().currentTime,0.1);}catch(e){}}
}

// ════════════════════════════════════════════════
//  INPUT — Keyboard + Analog Joystick + Buttons
// ════════════════════════════════════════════════
const K={};
addEventListener('keydown',e=>{K[e.code]=true;if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();});
addEventListener('keyup',e=>{K[e.code]=false;});

// ── Analog Joystick state ──────────────────────
const joy={x:0,y:0,tid:-1};         // normalized -1..1
const btn={jump:false,attack:false}; // action buttons

const DEAD=0.22;   // deadzone
const JOY_MAX=52;  // max pixel offset from knob center

const stickZone=document.getElementById('stick-zone');
const stickKnob=document.getElementById('stick-knob');
const btnJump  =document.getElementById('btn-jump');
const btnAttack=document.getElementById('btn-attack');

function stickCenter(){
  const r=stickZone.getBoundingClientRect();
  return{x:r.left+r.width/2,y:r.top+r.height/2};
}
function moveKnob(tx,ty){
  const c=stickCenter();
  const dx=tx-c.x,dy=ty-c.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const clamped=Math.min(dist,JOY_MAX);
  const angle=Math.atan2(dy,dx);
  joy.x=(clamped/JOY_MAX)*Math.cos(angle);
  joy.y=(clamped/JOY_MAX)*Math.sin(angle);
  stickKnob.style.transform=`translate(${Math.cos(angle)*clamped}px,${Math.sin(angle)*clamped}px)`;
  stickKnob.classList.add('active');
}
function resetKnob(){
  joy.x=0;joy.y=0;joy.tid=-1;
  stickKnob.style.transform='translate(0,0)';
  stickKnob.classList.remove('active');
}

// Joystick touch events
stickZone.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];joy.tid=t.identifier;moveKnob(t.clientX,t.clientY);
},{passive:false});
document.addEventListener('touchmove',e=>{
  for(const t of e.changedTouches)if(t.identifier===joy.tid){moveKnob(t.clientX,t.clientY);break;}
},{passive:false});
['touchend','touchcancel'].forEach(ev=>document.addEventListener(ev,e=>{
  for(const t of e.changedTouches)if(t.identifier===joy.tid){resetKnob();break;}
},{passive:false}));

// Button press helpers
function bindBtn(el,key){
  ['touchstart','mousedown'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();btn[key]=true;el.classList.add('pressed');},{passive:false}));
  ['touchend','mouseup','touchcancel'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();btn[key]=false;el.classList.remove('pressed');},{passive:false}));
}
bindBtn(btnJump,'jump');bindBtn(btnAttack,'attack');

// ── Any-tap: for menu/clear/gameover screen transitions ──
// A tap anywhere on the canvas (not on the control buttons) advances screens.
let anyTap=false;
canvas.addEventListener('touchstart',e=>{e.preventDefault();anyTap=true;},{passive:false});
canvas.addEventListener('mousedown', e=>{anyTap=true;});
function consumeTap(){const v=anyTap;anyTap=false;return v;}

// Joystick-up → jump (flick up also triggers jump)
let joyJumpPrev=false;
function updateJoyJump(){
  const up=joy.y<-0.65;
  if(up&&!joyJumpPrev)btn.jump=true;
  joyJumpPrev=up;
}

// Unified inp interface
const inp={
  left:   ()=>joy.x<-DEAD||K['ArrowLeft']||K['KeyA'],
  right:  ()=>joy.x>DEAD ||K['ArrowRight']||K['KeyD'],
  jump:   ()=>btn.jump   ||K['Space']||K['ArrowUp']||K['KeyW'],
  down:   ()=>joy.y>0.60 ||K['ArrowDown']||K['KeyS'],
  attack: ()=>btn.attack ||K['KeyZ']||K['KeyX'],
  restart:()=>K['KeyR'],
  // Analog magnitude for proportional speed (0..1)
  moveAbs:()=>Math.abs(joy.x)>DEAD?Math.min(1,Math.abs(joy.x)*1.3):1,
};

// ════════════════════════════════════════════════
//  MAP BUILDER
// ════════════════════════════════════════════════
function ps(str){
  const rows=str.trim().split('\n');
  return rows.slice(0,14).map(r=>{const s=r.slice(0,SEC_W);return s+'.'.repeat(Math.max(0,SEC_W-s.length));});
}
function buildMap(secs){return Array.from({length:14},(_,r)=>secs.map(s=>s[r]).join(''));}
const G88T='T'.repeat(90),G88I='I'.repeat(90),G88S='S'.repeat(90);

// ════════════════════════════════════════════════
//  STAGE MAP DATA
//  T=tile I=ice S=snowfloe .=air c=coin *=star
//  s=spike E=fish P=bear B=bird F=goal M=emperor-powerup
// ════════════════════════════════════════════════
const m1a=ps(`
........................................................................................
.....*.............................*..........................................*...........
..c.c.c...............c.c.c.....c.c........................................c.c.c.........
........................................................................................
......TTTTT.........TTTT..IIII.........TTT.......TTTTTT......TTT.....TTTT...............
.M..............c.c.c...........E.......................................E...............
..c.c........c.c.c..IIIIII......TTT.........c.c.c..TTTTTT..TTTT.TTTT...............TTT.
TTTT.TTT...TTT.TTT.............TTT.......E..TTT......TTT.................s.s..E..TTTT..
TTTT.TTT...TTT.TTT...TTTTTTTTT..TTT..IIIII..TTT......TTTTT..TTTT.TTTTTTT.TTTTT.........
${G88T}
${G88T}`);
const m1b=ps(`
........................................................................................
..*...........*...............*...............................................*..........
.c.c.c..........c.c.............c.c.c.c.......................................c.c.......
........................................................................................
.....IIIII.TTTT...........TTTTT..IIIII..TTT.TTTTT.......IIIII..TTTT....TTTT.IIIIII....
.............E....M.......E......................E.................P......................
TTT..IIIII.TTTT...IIIII..TTTT...IIIIII.TTT......IIIII..TTT.TTTT.IIII..TTTT..IIIII..TTT
.....TTT.............TTT..TTT.......TTT.TTT........TTT.......TTT........s.s.s....E..TTT
TTTTTTTTT.TTTTTT.TTTTTTT..TTTTTTTTTTTTTTTTTTT..TTTTTTTTTTTTTTTTT..TTTTTTTTTT.TTTTTTTTT
${G88T}
${G88T}`);
const m1c=ps(`
........................................................................................
.......*...............*..........*......................*...........*...*................
.c.c.c..c.............c.c.c..........c.c..c.c.......c.c.c...........c.c.c.c.c..........
........................................................................................
...TTTT.TTTT..IIIIII...TTTT...TTTTT.......IIIII..TTTTTT....TTTT.IIIIII..TTTT.TTTTT....
..........E...........E..E.......E..B.........E.....E...........E...M...B...............
.TTT.TTTT.TTTTT..IIIII..TTTT.IIIIII.TTTT.IIIII.TTTT.TTTTT.IIIIII.TTTT..TTTTT.IIIII.TT
TTT..TTT.....TTT...TTT.......TTT.....TTT....TTT...TTT.......s.s.s.TTT......TTT.E..TTTT
TTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTT
${G88T}
${G88T}`);
const m1d=ps(`
........................................................................................
...*...........*...*...............*....*...............*...*...........*....*..........

// ════════════════════════════════════════════════
//  TILE MAP GLOBALS
// ════════════════════════════════════════════════
let tileMap=[],coinList=[],enemyList=[],starList=[],powerUpList=[],goalGate=null,COLS=SEC_W*4;
function parseLevel(idx){
  const st=STAGES[idx];COLS=st.cols;
  tileMap=[];coinList=[];enemyList=[];starList=[];powerUpList=[];goalGate=null;
  for(let r=0;r<ROWS;r++){
    tileMap[r]=[];
    const row=st.map[r]||'';
    for(let c=0;c<COLS;c++){
      const ch=row[c]||'.';
      if(ch==='T')tileMap[r][c]=1;
      else if(ch==='I')tileMap[r][c]=2;
      else if(ch==='S')tileMap[r][c]=3;
      else if(ch==='s')tileMap[r][c]=4;
      else if(ch==='c'){tileMap[r][c]=0;coinList.push(new Coin(c*T,r*T));}
      else if(ch==='*'){tileMap[r][c]=0;starList.push(new Star(c*T+T/2,r*T+T/2));}
      else if(ch==='E'){tileMap[r][c]=0;enemyList.push(new Enemy(c*T,(r-1)*T,'fish'));}
      else if(ch==='P'){tileMap[r][c]=0;enemyList.push(new Enemy(c*T,(r-1)*T,'bear'));}
      else if(ch==='B'){tileMap[r][c]=0;enemyList.push(new FlyEnemy(c*T,r*T));}
      else if(ch==='F'){tileMap[r][c]=0;goalGate=new GoalGate(c*T-24,2*T);}
      else if(ch==='M'){tileMap[r][c]=0;powerUpList.push(new PowerUpItem(c*T+T/2,r*T+T/2));}
      else tileMap[r][c]=0;
    }
  }
}
const getTile=(c,r)=>r<0?0:r>=ROWS?1:c<0||c>=COLS?0:tileMap[r]?.[c]??0;
const solid=t=>t===1||t===2||t===3;

//  CAMERA
// ════════════════════════════════════════════════
const cam={x:0,y:0};
function camUpdate(px,py){
  cam.x+=(px-W*0.38-cam.x)*0.09;cam.y+=(py-H*0.52-cam.y)*0.07;
  cam.x=Math.max(0,Math.min(cam.x,COLS*T-W));cam.y=Math.max(0,Math.min(cam.y,ROWS*T-H));
}

// ════════════════════════════════════════════════
const parts=[];
class Part{
  constructor(x,y,vx,vy,col,life,sz=4,grav=0.2){Object.assign(this,{x,y,vx,vy,col,life,maxL:life,sz,grav});}
  tick(){this.x+=this.vx;this.y+=this.vy;this.vy+=this.grav;this.vx*=0.97;this.life--;}
  draw(cx,cy){ctx.globalAlpha=Math.max(0,this.life/this.maxL);ctx.fillStyle=this.col;ctx.fillRect(this.x-cx-this.sz/2,this.y-cy-this.sz/2,this.sz,this.sz);ctx.globalAlpha=1;}
}
class TextPop{
  constructor(x,y,txt,col='#ffd700',sz=18){Object.assign(this,{x,y,txt,col,sz,life:60,maxL:60});}
  tick(){this.y-=0.8;this.life--;}
  draw(cx,cy){
    ctx.globalAlpha=Math.min(1,this.life/20);
    ctx.font=`bold ${this.sz}px "Courier New"`;ctx.textAlign='center';
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillText(this.txt,this.x-cx+1,this.y-cy+1);
    ctx.fillStyle=this.col;ctx.fillText(this.txt,this.x-cx,this.y-cy);
    ctx.textAlign='left';ctx.globalAlpha=1;
  }
}
const popups=[];
function burst(x,y,col,n=10,spd=4,sz=4){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2;parts.push(new Part(x,y,Math.cos(a)*spd*(0.5+Math.random()*0.5),Math.sin(a)*spd*Math.random()-2,col,32,sz));}}
function confettiBurst(x,y){const cols=['#ff3355','#ffd700','#00eeaa','#66aaff','#ff88ff','#ffffff','#ffaa00','#44ffcc'];for(let i=0;i<80;i++){const a=Math.random()*Math.PI*2,s=3+Math.random()*6;parts.push(new Part(x,y,Math.cos(a)*s,Math.sin(a)*s-5,cols[i%cols.length],60,4+Math.random()*5,0.25));}}
function snowBurst(x,y,n=8){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2;parts.push(new Part(x,y,Math.cos(a)*2.5*Math.random(),Math.sin(a)*2*Math.random()-1,'#c8e8ff',22,2));}}
function starBurst(x,y){for(let i=0;i<14;i++){const a=i/14*Math.PI*2;parts.push(new Part(x,y,Math.cos(a)*4.5,Math.sin(a)*4.5,'#ffd700',40,5));parts.push(new Part(x,y,Math.cos(a)*2.5,Math.sin(a)*2.5,'#ffffff',30,3));}}
function emperorBurst(x,y){for(let i=0;i<20;i++){const a=Math.random()*Math.PI*2,s=3+Math.random()*7;parts.push(new Part(x,y,Math.cos(a)*s,Math.sin(a)*s-3,'#ffd700',50,6));parts.push(new Part(x,y,Math.cos(a)*s*0.6,Math.sin(a)*s*0.6,'#ff8800',40,4));}}

const snowflakes=Array.from({length:110},()=>({x:Math.random()*W,y:Math.random()*H,s:Math.random()*2.8+0.5,sp:Math.random()*1.4+0.4,dr:(Math.random()-0.5)*0.5,a:Math.random()*6.28}));
const aurora=Array.from({length:5},(_,i)=>({ph:i/5*6.28,col:['#00ffaa','#00aaff','#aa00ff','#00ffcc','#aaffcc'][i]}));
let bgStars=null;
function drawBG(bgType){
  const skies={arctic:['#04091a','#0a1e38','#142d50'],glacier:['#020610','#06122a','#0c2040'],ocean:['#030816','#0a1a30','#122040'],antarctic:['#010510','#05101e','#0a1828']};
  const sk=skies[bgType]||skies.arctic;
  const gr=ctx.createLinearGradient(0,0,0,H);
  gr.addColorStop(0,sk[0]);gr.addColorStop(0.55,sk[1]);gr.addColorStop(1,sk[2]);
  ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);
  aurora.forEach(a=>{a.ph+=0.006;const y=H*0.25+Math.sin(a.ph)*40;const ag=ctx.createLinearGradient(0,y-50,0,y+50);ag.addColorStop(0,'transparent');ag.addColorStop(0.5,a.col+'30');ag.addColorStop(1,'transparent');ctx.fillStyle=ag;ctx.fillRect(0,y-50,W,100);});
  if(!bgStars)bgStars=Array.from({length:120},()=>({x:Math.random()*W,y:Math.random()*(H*0.65),r:Math.random()*1.8+0.3,ph:Math.random()*6.28}));
  bgStars.forEach(s=>{s.ph+=0.012;const br=0.35+Math.sin(s.ph)*0.25;ctx.fillStyle=`rgba(210,230,255,${br})`;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});
  if(bgType==='arctic'||bgType==='antarctic'){const mx=-cam.x*0.06;ctx.fillStyle='#0e2035';for(let i=0;i<9;i++){const bx=((mx+i*150)%(W+300)+W+300)%(W+300)-150,bh=60+i%4*25;ctx.beginPath();ctx.moveTo(bx,H);ctx.lineTo(bx+75,H-bh);ctx.lineTo(bx+150,H);ctx.closePath();ctx.fill();}ctx.fillStyle='rgba(200,230,255,0.22)';for(let i=0;i<9;i++){const bx=((mx+i*150)%(W+300)+W+300)%(W+300)-150,bh=60+i%4*25;ctx.beginPath();ctx.moveTo(bx+75-18,H-bh+18);ctx.lineTo(bx+75,H-bh);ctx.lineTo(bx+75+18,H-bh+18);ctx.closePath();ctx.fill();}}
  if(bgType==='glacier'){const gx=-cam.x*0.07;ctx.fillStyle='#061830';for(let i=0;i<7;i++){const bx=((gx+i*180)%(W+360)+W+360)%(W+360)-180,bh=90+i%3*35;ctx.beginPath();ctx.moveTo(bx,H);ctx.lineTo(bx+90,H-bh);ctx.lineTo(bx+180,H);ctx.closePath();ctx.fill();}}
  if(bgType==='ocean'){const ox=-cam.x*0.05;ctx.fillStyle='#06182a';for(let i=0;i<11;i++){const bx=((ox+i*120)%(W+240)+W+240)%(W+240)-120,bh=40+i%5*18;ctx.beginPath();ctx.arc(bx+60,H-bh,60,Math.PI,0);ctx.closePath();ctx.fill();}}
  const hx=-cam.x*0.22;ctx.fillStyle=bgType==='ocean'?'#071828':'#0c2038';
  for(let i=0;i<7;i++){const bx=((hx+i*185)%(W+370)+W+370)%(W+370)-185;ctx.beginPath();ctx.moveTo(bx,H);ctx.bezierCurveTo(bx+40,H-52,bx+80,H-62,bx+92,H-42);ctx.bezierCurveTo(bx+108,H-22,bx+150,H-45,bx+185,H);ctx.closePath();ctx.fill();}
  const bliz=bgType==='antarctic'?2.5:1;
  snowflakes.forEach(s=>{s.x+=s.dr*bliz+(bgType==='antarctic'?-1.2:0)-cam.x*0.0003;s.y+=s.sp;s.a+=0.03;if(s.y>H+8)s.y=-8;if(s.x>W+8)s.x=-8;if(s.x<-8)s.x=W+8;const al=bgType==='antarctic'?0.65:0.38;ctx.fillStyle=`rgba(210,235,255,${al*(0.6+s.s*0.1)})`;ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.a);if(s.s>2){for(let j=0;j<6;j++){ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,s.s*2);ctx.strokeStyle=`rgba(210,235,255,${al})`;ctx.lineWidth=0.8;ctx.stroke();ctx.rotate(Math.PI/3);}}else{ctx.beginPath();ctx.arc(0,0,s.s*0.6,0,Math.PI*2);ctx.fill();}ctx.restore();});
}

function drawTile(c,r,cx,cy,bgType){

class Enemy{
  constructor(x,y,type='fish'){this.x=x;this.y=y;this.type=type;this.w=type==='bear'?34:28;this.h=type==='bear'?34:28;this.vx=-1.6;this.vy=0;this.onGround=false;this.dead=false;this.deadT=0;this.wa=0;this.sx=x;this.pr=type==='bear'?130:100;}
  tick(){
    if(this.dead){this.deadT++;return;}
    this.vy+=GRAV;this.x+=this.vx;this.y+=this.vy;
    if(Math.abs(this.x-this.sx)>this.pr)this.vx*=-1;
    this.onGround=false;
    const cl=Math.floor(this.x/T),cr=Math.floor((this.x+this.w)/T),rt=Math.floor(this.y/T),rb=Math.floor((this.y+this.h)/T);
    if(solid(getTile(cl,rb))||solid(getTile(cr,rb))){this.y=rb*T-this.h;this.vy=0;this.onGround=true;}
    if(solid(getTile(cl,rt))||solid(getTile(cl,rb-1))){this.x=(cl+1)*T;this.vx=Math.abs(this.vx);}
    if(solid(getTile(cr,rt))||solid(getTile(cr,rb-1))){this.x=cr*T-this.w;this.vx=-Math.abs(this.vx);}
    if(this.onGround){if(!solid(getTile(Math.floor(this.x/T),rb+1))&&this.vx<0)this.vx=Math.abs(this.vx);if(!solid(getTile(Math.floor((this.x+this.w)/T),rb+1))&&this.vx>0)this.vx=-Math.abs(this.vx);}
    this.wa+=0.14;
  }
  draw(cx,cy){
    if(this.dead){if(this.deadT<20){ctx.save();ctx.translate(this.x-cx+this.w/2,this.y-cy+this.h);this.type==='bear'?drawBearSq(ctx):drawFishSq(ctx);ctx.restore();}return;}
    ctx.save();ctx.translate(this.x-cx+this.w/2,this.y-cy+this.h/2);if(this.vx>0)ctx.scale(-1,1);
    this.type==='bear'?drawBear(ctx,this.wa):drawFish(ctx,this.wa);
    ctx.restore();
  }
}

  }
}

// ════════════════════════════════════════════════
//  PLAYER (Normal + Emperor Penguin)
// ════════════════════════════════════════════════
class Player{
  constructor(){
    this.x=2*T;this.y=7*T;this.w=26;this.h=32;this.vx=0;this.vy=0;
    this.onGround=false;this.onIce=false;this.jc=0;this.jHeld=false;
    this.sliding=false;this.slideT=0;this.facing=1;this.wa=0;
    this.hurtT=0;this.alive=true;this.won=false;
    this.power='normal'; // 'normal' | 'emperor'
    this.attackCd=0;this.attackHeld=false;
    this.transformT=0; // glow timer after transform
  }
  get isEmperor(){return this.power==='emperor';}
  get spd(){return this.isEmperor?MSPD*1.25:MSPD;}
  tick(){
    if(!this.alive||this.won)return;
    if(this.hurtT>0)this.hurtT--;
    if(this.attackCd>0)this.attackCd--;
    if(this.transformT>0)this.transformT--;
    const ice=this.onIce;
    // Slide
    const ws=inp.down()&&this.onGround&&!this.sliding&&Math.abs(this.vx)>0.5;
    if(ws){this.sliding=true;this.slideT=52;this.h=this.isEmperor?24:18;this.vx+=this.facing*(this.isEmperor?9:7);SFX.slide();snowBurst(this.x+this.w/2,this.y+this.h);}
    if(this.sliding){this.slideT--;if(this.slideT<=0||(!inp.down()&&this.slideT<40)){this.sliding=false;this.h=this.isEmperor?40:32;}}
    // Move
    if(!this.sliding){const mag=inp.moveAbs();if(inp.left()){this.vx+=ice?-0.4*mag:-1.5*mag;this.facing=-1;}if(inp.right()){this.vx+=ice?0.4*mag:1.5*mag;this.facing=1;}this.vx=Math.max(-this.spd,Math.min(this.spd,this.vx));}
    if(this.onGround){this.vx*=ice?ICE_F:GND_F;if(!this.sliding&&Math.abs(this.vx)<0.1)this.vx=0;}
    // Jump
    const jp=inp.jump();
    if(jp&&!this.jHeld){
      if(this.onGround){this.vy=this.isEmperor?JFORCE*1.05:JFORCE;this.jc=1;this.jHeld=true;SFX.jump();snowBurst(this.x+this.w/2,this.y+this.h,5);}
      else if(this.jc===1){this.vy=J2FORCE;this.jc=2;this.jHeld=true;SFX.jump2();burst(this.x+this.w/2,this.y+this.h,'#aaddff',8,3,4);}
    }
    if(!jp)this.jHeld=false;
    // Attack — throw fish
    const atk=inp.attack();
    if(atk&&!this.attackHeld&&this.attackCd===0&&!this.sliding){
      this.attackHeld=true;this.attackCd=this.isEmperor?18:28;
      const px=this.facing>0?this.x+this.w+4:this.x-8;
      projectiles.push(new Projectile(px,this.y+this.h*0.4,this.facing,this.isEmperor));
      SFX.throw();
    }
    if(!atk)this.attackHeld=false;
    // Physics
    this.vy=Math.min(this.vy+GRAV,18);this.x+=this.vx;this.y+=this.vy;
    this.collide();
    if(this.onGround&&Math.abs(this.vx)>0.3)this.wa+=Math.abs(this.vx)*0.13;
    if(this.y>ROWS*T+100)this.alive=false;
    // Spike
    const pc=Math.floor((this.x+this.w/2)/T),pr2=Math.floor((this.y+this.h-2)/T);
    if(getTile(pc,pr2)===4&&this.hurtT===0)this.takeHit(true);
  }
  takeHit(fromSpike=false){
    if(this.hurtT>0)return;
    if(this.isEmperor){
      // Revert to normal
      this.power='normal';this.w=26;this.h=32;
      this.hurtT=80;this.vy=-8;
      burst(this.x+this.w/2,this.y+this.h/2,'#ffd700',14,6);
      popups.push(new TextPop(this.x+this.w/2,this.y,'変身解除！','#ffd700',16));
      SFX.revert();
    } else {
      this.hurtT=100;this.vy=-8;SFX.hurt();
      burst(this.x+this.w/2,this.y+this.h/2,'#ff4455',12,5);
      g.lives--;
      if(g.lives<=0)this.alive=false;
    }
  }
  collide(){
    this.onGround=false;this.onIce=false;
    const cl=Math.floor(this.x/T),cr=Math.floor((this.x+this.w-1)/T);
    const rt=Math.floor(this.y/T),rb=Math.floor((this.y+this.h-1)/T);
    if(this.vy>0){if(solid(getTile(cl,rb))||solid(getTile(cr,rb))){this.y=rb*T-this.h;this.vy=0;this.onGround=true;this.jc=0;const t2=getTile(cl,rb)||getTile(cr,rb);if(t2===2)this.onIce=true;}}
    else if(this.vy<0){if(solid(getTile(cl,rt))||solid(getTile(cr,rt))){this.y=(rt+1)*T;this.vy=0;}}
    const rt2=Math.floor(this.y/T),rb2=Math.floor((this.y+this.h-1)/T);
    if(this.vx>0){const cc=Math.floor((this.x+this.w-1)/T);if(solid(getTile(cc,rt2))||solid(getTile(cc,rb2))){this.x=cc*T-this.w;this.vx=0;}}
    else if(this.vx<0){const cc=Math.floor(this.x/T);if(solid(getTile(cc,rt2))||solid(getTile(cc,rb2))){this.x=(cc+1)*T;this.vx=0;}}
    if(this.x<0){this.x=0;this.vx=0;}if(this.x+this.w>COLS*T){this.x=COLS*T-this.w;this.vx=0;}
  }
  draw(cx,cy){
    const px=this.x-cx,py=this.y-cy;
    if(this.hurtT>0&&Math.floor(this.hurtT/4)%2===0)return;
    // Transform glow
    if(this.transformT>0){ctx.shadowColor='#ffd700';ctx.shadowBlur=this.transformT*0.8;}
    ctx.save();ctx.translate(px+this.w/2,py+this.h);if(this.facing===-1)ctx.scale(-1,1);
    if(this.isEmperor){
      if(this.sliding)drawEmpSlide(ctx);
      else if(!this.onGround)drawEmpJump(ctx,this.vy);
      else if(Math.abs(this.vx)>0.3)drawEmpWalk(ctx,this.wa);
      else drawEmpIdle(ctx);
    } else {
      if(this.sliding)drawPSlide(ctx);
      else if(!this.onGround)drawPJump(ctx,this.vy);
      else if(Math.abs(this.vx)>0.3)drawPWalk(ctx,this.wa);
      else drawPIdle(ctx);
    }
    ctx.restore();
    ctx.shadowBlur=0;
  }
}

// ════════════════════════════════════════════════
//  PENGUIN SPRITES (Normal)
// ════════════════════════════════════════════════
function pBase(ctx,wa=0){const ww=Math.sin(wa)*6;ctx.fillStyle='#0a0a40';ctx.beginPath();ctx.ellipse(-13,-18+ww*0.5,5,9,-0.35,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(13,-18-ww*0.5,5,9,0.35,0,Math.PI*2);ctx.fill();ctx.fillStyle='#0d0d50';ctx.beginPath();ctx.ellipse(0,-17,13,16,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#eaf0ff';ctx.beginPath();ctx.ellipse(1,-13,8,11,0.1,0,Math.PI*2);ctx.fill();ctx.fillStyle='#0d0d50';ctx.beginPath();ctx.ellipse(0,-31,12,12,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='white';ctx.beginPath();ctx.ellipse(5,-34,5,5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#08082a';ctx.beginPath();ctx.ellipse(6,-34,2.5,2.5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='white';ctx.beginPath();ctx.ellipse(7,-35,1.1,1.1,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff8c00';ctx.beginPath();ctx.moveTo(11,-32);ctx.lineTo(19,-30);ctx.lineTo(11,-28);ctx.closePath();ctx.fill();}
function pFeet(ctx,lx=0,ly=0,rx=0,ry=0){ctx.fillStyle='#ff8c00';ctx.beginPath();ctx.ellipse(-5+lx,ly,5,3,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(5+rx,ry,5,3,0,0,Math.PI*2);ctx.fill();}
function drawPIdle(ctx){pBase(ctx,0);pFeet(ctx);}
function drawPWalk(ctx,a){const f=Math.sin(a)*4.5;pBase(ctx,f);const l=Math.sin(a)*5,r=Math.sin(a+Math.PI)*5;pFeet(ctx,l*0.4,l>0?-3:0,r*0.4,r>0?-3:0);}
function drawPJump(ctx,vy){const st=vy<0?-3:2;ctx.fillStyle='#0a0a40';ctx.beginPath();ctx.ellipse(-15,-20,5,8,-0.7,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(15,-20,5,8,0.7,0,Math.PI*2);ctx.fill();ctx.fillStyle='#0d0d50';ctx.beginPath();ctx.ellipse(0,-17,12,16+st,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#eaf0ff';ctx.beginPath();ctx.ellipse(1,-13,7,11+st*0.5,0.1,0,Math.PI*2);ctx.fill();const hy=vy<0?-2:2;ctx.fillStyle='#0d0d50';ctx.beginPath();ctx.ellipse(0,-32+hy,12,12,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='white';ctx.beginPath();ctx.ellipse(5,-35+hy,5,5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#08082a';ctx.beginPath();ctx.ellipse(6,-35+hy,2.5,2.5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff8c00';ctx.beginPath();ctx.moveTo(11,-33+hy);ctx.lineTo(19,-31+hy);ctx.lineTo(11,-29+hy);ctx.closePath();ctx.fill();pFeet(ctx,-2,-4,2,-4);}
function drawPSlide(ctx){ctx.save();ctx.rotate(-Math.PI/2.3);ctx.fillStyle='#0a0a40';ctx.beginPath();ctx.ellipse(-14,-17,5,8,-0.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(12,-17,5,8,0.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#0d0d50';ctx.beginPath();ctx.ellipse(0,0,19,10,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#eaf0ff';ctx.beginPath();ctx.ellipse(0,3,13,7,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#0d0d50';ctx.beginPath();ctx.ellipse(19,-1,11,11,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='white';ctx.beginPath();ctx.ellipse(24,-4,4,4,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#08082a';ctx.beginPath();ctx.ellipse(25,-4,2,2,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff8c00';ctx.beginPath();ctx.moveTo(28,-1);ctx.lineTo(36,1);ctx.lineTo(28,3);ctx.closePath();ctx.fill();ctx.fillStyle='#ff8c00';ctx.beginPath();ctx.ellipse(-14,8,6,3,0.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(-5,10,6,3,0.1,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(160,210,255,0.6)';ctx.lineWidth=2.5;for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(-22-i*9,-6+i*6);ctx.lineTo(-33-i*9,-6+i*6);ctx.stroke();}ctx.restore();}

//  EMPEROR PENGUIN SPRITES  (bigger, yellow chest, crown)
// ════════════════════════════════════════════════
// ═══════════════════════════════════════════════
//  EMPEROR PENGUIN SPRITES
//  Accurate markings: black back/cap, white face patch,
//  yellow-orange auricular (ear/neck) patches,
//  white belly, long pink-orange beak with lilac stripe,
//  small gold crown as powerup indicator
// ═══════════════════════════════════════════════

// Shared helper: draw the emperor's beak at offset (hy)
function empBeak(ctx,hy=0){
  // Upper mandible - orange-pink, long and slightly curved down
  ctx.fillStyle='#e8722a';
  ctx.beginPath();
  ctx.moveTo(9,-38+hy);
  ctx.bezierCurveTo(18,-37+hy, 23,-35+hy, 22,-33+hy);
  ctx.bezierCurveTo(21,-31+hy, 14,-32+hy, 9,-34+hy);
  ctx.closePath();ctx.fill();
  // Lower mandible - slightly lighter
  ctx.fillStyle='#d4621a';
  ctx.beginPath();
  ctx.moveTo(9,-34+hy);
  ctx.bezierCurveTo(18,-34+hy, 22,-33+hy, 20,-31+hy);
  ctx.bezierCurveTo(18,-30+hy, 12,-31+hy, 9,-33+hy);
  ctx.closePath();ctx.fill();
  // Lilac/pink stripe on lower mandible (distinctive emperor trait)
  ctx.fillStyle='#c090cc';
  ctx.beginPath();
  ctx.moveTo(10,-34+hy);ctx.lineTo(20,-33+hy);ctx.lineTo(19,-32+hy);ctx.lineTo(10,-33+hy);
  ctx.closePath();ctx.fill();
  // Tip highlight
  ctx.fillStyle='rgba(255,200,150,0.5)';
  ctx.beginPath();ctx.ellipse(17,-35+hy,3,1.2,-0.2,0,Math.PI*2);ctx.fill();
}

// Core body drawing, shared by idle/walk poses
// origin: bottom-center of sprite (feet level)
function empBody(ctx,wa=0){
  const sw=Math.sin(wa)*6; // flipper swing

  // ── BLACK BACK/SIDES  (drawn first = behind everything) ──
  ctx.fillStyle='#0d0d12';
  // Main body silhouette
  ctx.beginPath();
  ctx.ellipse(0,-22,17,22,0,0,Math.PI*2);
  ctx.fill();

  // ── FLIPPERS ── (long flat, hug the sides)
  // Left flipper
  ctx.fillStyle='#0d0d12';
  ctx.beginPath();
  ctx.moveTo(-13,-36+sw*0.5);
  ctx.bezierCurveTo(-26,-34+sw*0.5,-28,-18+sw,-22,-4+sw);
  ctx.bezierCurveTo(-18,-2+sw,-14,-8+sw,-12,-20+sw*0.5);
  ctx.closePath();ctx.fill();
  // Right flipper
  ctx.beginPath();
  ctx.moveTo(13,-36-sw*0.5);
  ctx.bezierCurveTo(26,-34-sw*0.5,28,-18-sw,22,-4-sw);
  ctx.bezierCurveTo(18,-2-sw,14,-8-sw,12,-20-sw*0.5);
  ctx.closePath();ctx.fill();

  // ── WHITE BELLY ── (large oval, front-center)
  ctx.fillStyle='#f0f4ff';
  ctx.beginPath();
  ctx.ellipse(1,-18,11,19,0.04,0,Math.PI*2);
  ctx.fill();

  // ── YELLOW-ORANGE UPPER CHEST BLEED ── (where belly meets neck)
  // Subtle warm gradient into the white chest
  const cg=ctx.createRadialGradient(0,-36,2,0,-30,14);
  cg.addColorStop(0,'rgba(250,195,60,0.75)');
  cg.addColorStop(0.55,'rgba(250,195,60,0.25)');
  cg.addColorStop(1,'rgba(250,195,60,0)');
  ctx.fillStyle=cg;
  ctx.beginPath();ctx.ellipse(0,-32,12,12,0,0,Math.PI*2);ctx.fill();

  // ── HEAD: rounded, slightly flattened ──
  ctx.fillStyle='#0d0d12';
  ctx.beginPath();
  ctx.ellipse(0,-42,14,13,0,0,Math.PI*2);
  ctx.fill();

  // ── WHITE FACE PATCH ── (large tear-drop on cheek/face side)
  // Emperor penguins have a big white/cream area wrapping from chin up cheek
  ctx.fillStyle='#f5f7ff';
  ctx.beginPath();
  ctx.moveTo(2,-52);  // top (between black cap and patch)
  ctx.bezierCurveTo(10,-52, 16,-47, 16,-41);
  ctx.bezierCurveTo(16,-35, 12,-32,  6,-30);
  ctx.bezierCurveTo(2,-28,  -2,-28, -2,-30);
  ctx.bezierCurveTo(-4,-32,  -3,-35, 0,-38);
  ctx.bezierCurveTo(2,-42,   2,-48,  2,-52);
  ctx.closePath();ctx.fill();

  // ── AURICULAR (EAR/NECK) PATCHES ──
  // Real emperor penguins: bright orange-yellow patch behind/below the eye,
  // at the sides of the neck, fading to pale yellow then white on chest.
  // Left side patch (we face right, so this is the back-left)
  const ag1=ctx.createRadialGradient(-10,-42,1,-10,-42,11);
  ag1.addColorStop(0,'rgba(255,175,20,0.92)');
  ag1.addColorStop(0.45,'rgba(255,210,60,0.60)');
  ag1.addColorStop(1,'rgba(255,220,80,0)');
  ctx.fillStyle=ag1;
  ctx.beginPath();ctx.ellipse(-10,-42,11,10,0.3,0,Math.PI*2);ctx.fill();
  // Right side neck patch (visible as it wraps)
  const ag2=ctx.createRadialGradient(4,-37,1,4,-37,9);
  ag2.addColorStop(0,'rgba(255,185,25,0.70)');
  ag2.addColorStop(0.5,'rgba(255,215,60,0.35)');
  ag2.addColorStop(1,'rgba(255,215,60,0)');
  ctx.fillStyle=ag2;
  ctx.beginPath();ctx.ellipse(4,-36,9,8,-0.2,0,Math.PI*2);ctx.fill();

  // ── BLACK CAP ── (top of head, distinctive emperor marking)
  ctx.fillStyle='#0d0d12';
  ctx.beginPath();
  ctx.ellipse(-1,-49,10,8,0.15,0,Math.PI*2);
  ctx.fill();
  // Blend cap smoothly into head
  ctx.fillStyle='#0d0d12';
  ctx.beginPath();
  ctx.ellipse(-3,-45,8,6,0.3,0,Math.PI*2);
  ctx.fill();

  // ── EYE (on the white face patch) ──
  ctx.fillStyle='#0d0d12';
  ctx.beginPath();ctx.ellipse(7,-43,4.5,4.5,0,0,Math.PI*2);ctx.fill();
  // Brown/amber iris
  ctx.fillStyle='#4a2e08';
  ctx.beginPath();ctx.ellipse(7,-43,3.2,3.2,0,0,Math.PI*2);ctx.fill();
  // Pupil
  ctx.fillStyle='#050508';
  ctx.beginPath();ctx.ellipse(7.3,-43,2,2,0,0,Math.PI*2);ctx.fill();
  // Catchlight
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.beginPath();ctx.ellipse(6.2,-44.2,1.3,1,0,0,Math.PI*2);ctx.fill();
  // Tiny eye ring (white sclera sliver)
  ctx.strokeStyle='rgba(230,235,255,0.6)';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.ellipse(7,-43,4.5,4.5,0,0,Math.PI*2);ctx.stroke();

  // ── BEAK ──
  empBeak(ctx,0);

  // ── GOLD CROWN (game powerup indicator, small and tasteful) ──
  ctx.fillStyle='#ffd700';
  ctx.strokeStyle='#cc8800';ctx.lineWidth=0.8;
  ctx.beginPath();
  ctx.moveTo(-8,-58);ctx.lineTo(-8,-53);
  ctx.lineTo(-4,-57);ctx.lineTo(0,-53);
  ctx.lineTo(4,-57);ctx.lineTo(8,-53);
  ctx.lineTo(8,-58);ctx.closePath();
  ctx.fill();ctx.stroke();
  // Crown gems
  ctx.fillStyle='#ff2244';ctx.beginPath();ctx.arc(-4,-57,2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#0066ff';ctx.beginPath();ctx.arc(4,-57,2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(0,-53,1.5,0,Math.PI*2);ctx.fill();
  // Crown base band
  ctx.fillStyle='#e8a800';ctx.fillRect(-8,-55,16,3);
}

function empFeet(ctx,lx=0,ly=0,rx=0,ry=0){
  // Emperor penguin feet: broad, pink-orange with visible toes
  ctx.fillStyle='#c86018';
  ctx.beginPath();ctx.ellipse(-7+lx,ly,8,4,lx*0.04,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(7+rx,ry,8,4,rx*0.04,0,Math.PI*2);ctx.fill();
  // Toe lines
  ctx.strokeStyle='#a04810';ctx.lineWidth=1;
  [-3,0,3].forEach(tx=>{ctx.beginPath();ctx.moveTo(-7+lx+tx,ly);ctx.lineTo(-7+lx+tx,ly+4);ctx.stroke();});
  [-3,0,3].forEach(tx=>{ctx.beginPath();ctx.moveTo(7+rx+tx,ry);ctx.lineTo(7+rx+tx,ry+4);ctx.stroke();});
}

function drawEmpIdle(ctx){empBody(ctx,0);empFeet(ctx);}

function drawEmpWalk(ctx,a){
  empBody(ctx,a);
  const l=Math.sin(a)*6,r=Math.sin(a+Math.PI)*6;
  empFeet(ctx,l*0.35,l>0?-3:0,r*0.35,r>0?-3:0);
}

function drawEmpJump(ctx,vy){
  const sw=vy<0?-8:4; // flippers spread wide on jump
  const hy=vy<0?-3:2;

  // Body
  ctx.fillStyle='#0d0d12';
  ctx.beginPath();ctx.ellipse(0,-22,16,21,0,0,Math.PI*2);ctx.fill();

  // Flippers spread outward
  ctx.fillStyle='#0d0d12';
  ctx.beginPath();
  ctx.moveTo(-13,-36);
  ctx.bezierCurveTo(-28,-30+sw,-30,-16+sw,-24,-5+sw);
  ctx.bezierCurveTo(-18,-1+sw,-13,-7+sw,-12,-20);
  ctx.closePath();ctx.fill();
  ctx.beginPath();
  ctx.moveTo(13,-36);
  ctx.bezierCurveTo(28,-30-sw,30,-16-sw,24,-5-sw);
  ctx.bezierCurveTo(18,-1-sw,13,-7-sw,12,-20);
  ctx.closePath();ctx.fill();

  // White belly
  ctx.fillStyle='#f0f4ff';
  ctx.beginPath();ctx.ellipse(1,-18,10,18,0.04,0,Math.PI*2);ctx.fill();

  // Yellow chest glow
  const cg=ctx.createRadialGradient(0,-36+hy,2,0,-30+hy,13);
  cg.addColorStop(0,'rgba(250,195,60,0.75)');cg.addColorStop(1,'rgba(250,195,60,0)');
  ctx.fillStyle=cg;ctx.beginPath();ctx.ellipse(0,-32+hy,12,11,0,0,Math.PI*2);ctx.fill();

  // Head
  ctx.fillStyle='#0d0d12';
  ctx.beginPath();ctx.ellipse(0,-42+hy,14,13,0,0,Math.PI*2);ctx.fill();

  // White face patch
  ctx.fillStyle='#f5f7ff';
  ctx.beginPath();
  ctx.moveTo(2,-52+hy);ctx.bezierCurveTo(10,-52+hy,16,-47+hy,16,-41+hy);
  ctx.bezierCurveTo(16,-35+hy,12,-32+hy,6,-30+hy);ctx.bezierCurveTo(2,-28+hy,-2,-28+hy,-2,-30+hy);
  ctx.bezierCurveTo(-4,-32+hy,-3,-35+hy,0,-38+hy);ctx.bezierCurveTo(2,-42+hy,2,-48+hy,2,-52+hy);
  ctx.closePath();ctx.fill();

  // Auricular patches
  const ag1=ctx.createRadialGradient(-10,-42+hy,1,-10,-42+hy,11);
  ag1.addColorStop(0,'rgba(255,175,20,0.92)');ag1.addColorStop(1,'rgba(255,220,80,0)');
  ctx.fillStyle=ag1;ctx.beginPath();ctx.ellipse(-10,-42+hy,11,10,0.3,0,Math.PI*2);ctx.fill();
  const ag2=ctx.createRadialGradient(4,-37+hy,1,4,-37+hy,9);
  ag2.addColorStop(0,'rgba(255,185,25,0.70)');ag2.addColorStop(1,'rgba(255,215,60,0)');
  ctx.fillStyle=ag2;ctx.beginPath();ctx.ellipse(4,-36+hy,9,8,-0.2,0,Math.PI*2);ctx.fill();

  // Black cap
  ctx.fillStyle='#0d0d12';
  ctx.beginPath();ctx.ellipse(-1,-49+hy,10,8,0.15,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(-3,-45+hy,8,6,0.3,0,Math.PI*2);ctx.fill();

  // Eye
  ctx.fillStyle='#0d0d12';ctx.beginPath();ctx.ellipse(7,-43+hy,4.5,4.5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#4a2e08';ctx.beginPath();ctx.ellipse(7,-43+hy,3.2,3.2,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#050508';ctx.beginPath();ctx.ellipse(7.3,-43+hy,2,2,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.85)';ctx.beginPath();ctx.ellipse(6.2,-44.2+hy,1.3,1,0,0,Math.PI*2);ctx.fill();

  empBeak(ctx,hy);

  // Crown
  ctx.fillStyle='#ffd700';ctx.strokeStyle='#cc8800';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(-8,-58+hy);ctx.lineTo(-8,-53+hy);ctx.lineTo(-4,-57+hy);ctx.lineTo(0,-53+hy);ctx.lineTo(4,-57+hy);ctx.lineTo(8,-53+hy);ctx.lineTo(8,-58+hy);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.fillStyle='#ff2244';ctx.beginPath();ctx.arc(-4,-57+hy,2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#0066ff';ctx.beginPath();ctx.arc(4,-57+hy,2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e8a800';ctx.fillRect(-8,-55+hy,16,3);

  empFeet(ctx,-3,-4,3,-4);
}

function drawEmpSlide(ctx){
  ctx.save();ctx.rotate(-Math.PI/2.2);

  // Horizontal body (belly-sliding)
  // Black back (top in slide = back)
  ctx.fillStyle='#0d0d12';
  ctx.beginPath();ctx.ellipse(0,0,24,12,0,0,Math.PI*2);ctx.fill();

  // White belly (bottom in slide)
  ctx.fillStyle='#f0f4ff';
  ctx.beginPath();ctx.ellipse(1,3,17,9,0.05,0,Math.PI*2);ctx.fill();

  // Yellow chest patch
  const cg=ctx.createRadialGradient(16,0,1,16,0,10);
  cg.addColorStop(0,'rgba(250,195,60,0.80)');cg.addColorStop(1,'rgba(250,195,60,0)');
  ctx.fillStyle=cg;ctx.beginPath();ctx.ellipse(16,0,10,9,0,0,Math.PI*2);ctx.fill();

  // Flippers flat back
  ctx.fillStyle='#0d0d12';
  ctx.beginPath();ctx.moveTo(-8,-8);ctx.bezierCurveTo(-18,-10,-22,-6,-20,2);ctx.bezierCurveTo(-18,6,-12,5,-8,2);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(-8,8);ctx.bezierCurveTo(-18,10,-22,6,-20,-2);ctx.bezierCurveTo(-18,-6,-12,-5,-8,-2);ctx.closePath();ctx.fill();

  // Head
  ctx.fillStyle='#0d0d12';
  ctx.beginPath();ctx.ellipse(24,0,13,11,0,0,Math.PI*2);ctx.fill();

  // White face patch on head
  ctx.fillStyle='#f5f7ff';
  ctx.beginPath();
  ctx.moveTo(24,-11);ctx.bezierCurveTo(33,-11,37,-6,37,0);
  ctx.bezierCurveTo(37,6,33,10,26,10);ctx.bezierCurveTo(20,10,18,6,20,1);
  ctx.bezierCurveTo(22,-4,22,-9,24,-11);
  ctx.closePath();ctx.fill();

  // Auricular patches
  const ag=ctx.createRadialGradient(22,-5,1,22,-5,10);
  ag.addColorStop(0,'rgba(255,175,20,0.88)');ag.addColorStop(1,'rgba(255,220,80,0)');
  ctx.fillStyle=ag;ctx.beginPath();ctx.ellipse(22,-4,10,9,0.3,0,Math.PI*2);ctx.fill();

  // Black cap
  ctx.fillStyle='#0d0d12';
  ctx.beginPath();ctx.ellipse(22,-8,9,7,0.4,0,Math.PI*2);ctx.fill();

  // Eye
  ctx.fillStyle='#0d0d12';ctx.beginPath();ctx.ellipse(30,2,4,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#4a2e08';ctx.beginPath();ctx.ellipse(30,2,2.8,2.8,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#050508';ctx.beginPath();ctx.ellipse(30.3,2,1.7,1.7,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.85)';ctx.beginPath();ctx.ellipse(29.2,0.8,1.1,0.9,0,0,Math.PI*2);ctx.fill();

  // Beak pointing forward
  ctx.fillStyle='#e8722a';
  ctx.beginPath();ctx.moveTo(35,-1);ctx.bezierCurveTo(44,-1,47,1,46,3);ctx.bezierCurveTo(45,5,38,4,35,2);ctx.closePath();ctx.fill();
  ctx.fillStyle='#c090cc';ctx.beginPath();ctx.moveTo(36,1.5);ctx.lineTo(45,2.5);ctx.lineTo(44,3.5);ctx.lineTo(36,2.5);ctx.closePath();ctx.fill();

  // Crown on top of head
  ctx.fillStyle='#ffd700';ctx.strokeStyle='#cc8800';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(18,-16);ctx.lineTo(18,-11);ctx.lineTo(22,-15);ctx.lineTo(25,-11);ctx.lineTo(28,-15);ctx.lineTo(32,-11);ctx.lineTo(32,-16);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.fillStyle='#ff2244';ctx.beginPath();ctx.arc(22,-15,1.8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#0066ff';ctx.beginPath();ctx.arc(28,-15,1.8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e8a800';ctx.fillRect(18,-13,14,2.5);

  // Feet sticking back
  ctx.fillStyle='#c86018';
  ctx.beginPath();ctx.ellipse(-22,6,7,4,0.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(-14,8,7,4,0.1,0,Math.PI*2);ctx.fill();

  // Slide speed lines
  ctx.strokeStyle='rgba(160,210,255,0.55)';ctx.lineWidth=2.5;
  for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(-26-i*10,-8+i*6);ctx.lineTo(-36-i*10,-8+i*6);ctx.stroke();}
  ctx.restore();
}

// ════════════════════════════════════════════════
//  GOAL GATE

class GoalGate{
  constructor(x,y){this.x=x;this.y=y;this.w=T*2;this.h=T*4;this.triggered=false;this.t=0;}
  tick(){this.t++;}
  get triggerX(){return this.x+this.w/2-8;}
  get triggerY(){return this.y;}
  get triggerW(){return 20;}
  get triggerH(){return this.h+T;}
  draw(cx,cy){
    const x=this.x-cx,y=this.y-cy,t=this.t,archW=this.w+20,poleH=this.h+T+8;
    const pg=ctx.createLinearGradient(x-4,y,x+10,y);pg.addColorStop(0,'#aabbcc');pg.addColorStop(0.5,'#eef4ff');pg.addColorStop(1,'#778899');
    ctx.fillStyle=pg;ctx.fillRect(x-4,y-16,14,poleH+16);
    const pg2=ctx.createLinearGradient(x+archW-10,y,x+archW+4,y);pg2.addColorStop(0,'#aabbcc');pg2.addColorStop(0.5,'#eef4ff');pg2.addColorStop(1,'#778899');
    ctx.fillStyle=pg2;ctx.fillRect(x+archW-10,y-16,14,poleH+16);
    const bg=ctx.createLinearGradient(x-8,y-20,x-8,y-4);bg.addColorStop(0,'#ffee44');bg.addColorStop(0.5,'#ff6622');bg.addColorStop(1,'#ffee44');
    ctx.fillStyle=bg;ctx.fillRect(x-8,y-20,archW+16,22);
    const bw=archW+16,sqSize=11,offset=(Math.floor(t/6)%2)*sqSize;
    ctx.save();ctx.beginPath();ctx.rect(x-8,y-20,bw,22);ctx.clip();
    for(let bx=x-8-offset;bx<x-8+bw+sqSize;bx+=sqSize)for(let by=y-20;by<y+2;by+=sqSize){const ci=((Math.floor((bx-(x-8-offset))/sqSize)+(Math.floor((by-(y-20))/sqSize)))%2);ctx.fillStyle=ci?'#cc2233':'#ffffff';ctx.fillRect(bx,by,sqSize,sqSize);}
    ctx.restore();
    ctx.strokeStyle='#ffcc00';ctx.lineWidth=3;ctx.strokeRect(x-8,y-20,archW+16,22);
    for(let i=0;i<12;i++){const lx=x-4+i*(archW+16)/12;const on=Math.sin(t*0.1+i*0.5)>0;const lc=['#ff4466','#ffdd00','#44ffaa','#4488ff','#ff88ff'];ctx.shadowColor=lc[i%lc.length];ctx.shadowBlur=on?14:0;ctx.fillStyle=on?lc[i%lc.length]:'#334';ctx.beginPath();ctx.arc(lx,y-10,5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
    ctx.font='bold 15px "Courier New"';ctx.textAlign='center';ctx.fillStyle='#220000';ctx.fillText('GOAL!',x+archW/2,y-6);ctx.fillStyle='#ffffff';ctx.fillText('GOAL!',x+archW/2-1,y-7);ctx.textAlign='left';
    const ra=0.5+Math.sin(t*0.15)*0.3;ctx.fillStyle=`rgba(255,200,0,${ra})`;ctx.fillRect(x,y+this.h/2-2,archW,4);ctx.fillStyle=`rgba(255,255,255,${ra*0.8})`;ctx.fillRect(x,y+this.h/2-1,archW,2);
    ctx.fillStyle='rgba(100,160,220,0.5)';ctx.fillRect(x-8,y+this.h+2,archW+16,6);
  }
}

let goalAnim={active:false,timer:0,flashAlpha:1,textScale:0,textBounce:0,timeBonus:0,bonusAdded:false};
function triggerGoal(){
  const sec=Math.max(0,Math.ceil((g.timeMax-g.timer)/60));
  goalAnim={active:true,timer:0,flashAlpha:1,textScale:0,textBounce:0,timeBonus:sec*10,bonusAdded:false};
  SFX.goal();confettiBurst(W/2+cam.x,H/3+cam.y);confettiBurst(W/4+cam.x,H/2+cam.y);confettiBurst(3*W/4+cam.x,H/2+cam.y);
}
function tickGoalAnim(){
  if(!goalAnim.active)return;goalAnim.timer++;goalAnim.flashAlpha=Math.max(0,goalAnim.flashAlpha-0.045);
  if(goalAnim.timer<15)goalAnim.textScale=goalAnim.timer/15*1.3;
  else if(goalAnim.timer<22)goalAnim.textScale=1.3-(goalAnim.timer-15)/7*0.3;
  else goalAnim.textScale=1.0+Math.sin(goalAnim.timer*0.12)*0.03;
  goalAnim.textBounce=Math.sin(goalAnim.timer*0.08)*4;
  if(goalAnim.timer===40&&!goalAnim.bonusAdded){goalAnim.bonusAdded=true;g.score+=goalAnim.timeBonus;SFX.bonus();}
  if(goalAnim.timer%30===15)confettiBurst(Math.random()*W+cam.x,Math.random()*H*0.6+cam.y);
  if(goalAnim.timer>185){goalAnim.active=false;g.state='STAGECLEAR';}
}
function drawGoalAnim(){
  if(!goalAnim.active)return;
  if(goalAnim.flashAlpha>0){ctx.fillStyle=`rgba(255,255,255,${goalAnim.flashAlpha})`;ctx.fillRect(0,0,W,H);}
  if(goalAnim.flashAlpha<0.3){const ov=Math.min(0.5,(0.3-goalAnim.flashAlpha)/0.3*0.5);ctx.fillStyle=`rgba(0,8,22,${ov})`;ctx.fillRect(0,0,W,H);}
  ctx.save();ctx.textAlign='center';
  ctx.translate(W/2,H/2-20+goalAnim.textBounce);ctx.scale(goalAnim.textScale,goalAnim.textScale);
  ctx.shadowColor='#ffd700';ctx.shadowBlur=40;ctx.fillStyle='#ffd700';ctx.font='bold 80px "Courier New"';ctx.fillText('GOAL!',0,0);
  ctx.shadowColor='#ff8800';ctx.shadowBlur=20;ctx.fillStyle='#ff8800';ctx.font='bold 80px "Courier New"';ctx.fillText('GOAL!',3,3);
  ctx.shadowBlur=0;ctx.fillStyle='#ffffff';ctx.font='bold 80px "Courier New"';ctx.fillText('GOAL!',-2,-2);
  ctx.restore();
  if(goalAnim.timer>40&&goalAnim.timeBonus>0){const ba=Math.min(1,(goalAnim.timer-40)/15);ctx.globalAlpha=ba;ctx.textAlign='center';ctx.font='bold 24px "Courier New"';ctx.fillStyle='#ffd700';ctx.shadowColor='#ffd700';ctx.shadowBlur=12;ctx.fillText('TIME BONUS  +'+goalAnim.timeBonus,W/2,H/2+56);ctx.shadowBlur=0;ctx.globalAlpha=1;}
  if(goalAnim.timer>20)for(let i=0;i<3;i++){const sx=W*0.2+i*W*0.3,sy=(goalAnim.timer*2.5+i*60)%(H+20)-10;ctx.fillStyle='#ffd700';ctx.font='20px serif';ctx.textAlign='center';ctx.fillText('★',sx,sy);}
  ctx.textAlign='left';
}

const g={state:'TITLE',score:0,lives:3,coins:0,stars:0,timer:0,timeMax:60*320,stageIdx:0,coinMilestone:0};
let player=null;

function startStage(idx,isNew=false){
  if(isNew){g.score=0;g.lives=3;g.coins=0;g.stars=0;g.coinMilestone=0;}
  g.stageIdx=idx;g.timer=0;g.timeMax=STAGES[idx].timeMax;g.state='PLAYING';
  parseLevel(idx);player=new Player();parts.length=0;popups.length=0;projectiles.length=0;cam.x=0;cam.y=0;
  goalAnim={active:false,timer:0,flashAlpha:1,textScale:0,textBounce:0,timeBonus:0,bonusAdded:false};
  stageIntro={alpha:1,timer:0,active:true};
  if(!bgmPlaying)bgmInit();
  SFX.warp();
}

function checkEntities(){
  if(player.won)return;
  // Projectile vs enemies
  for(const proj of projectiles){
    if(proj.life<=0)continue;
    for(const e of enemyList){
      if(e.dead)continue;
      if(proj.x+proj.w/2>e.x&&proj.x-proj.w/2<e.x+e.w&&proj.y>e.y&&proj.y<e.y+e.h){
        e.dead=true;proj.life=0;
        g.score+=e.type==='bear'?300:150;
        burst(e.x+e.w/2,e.y+e.h/2,e instanceof FlyEnemy?'#88bbdd':'#ffcc44',10,5);
        SFX.kill();
      }
    }
    for(const e of enemyList){
      if(!(e instanceof FlyEnemy)||e.dead)continue;
      if(proj.x+proj.w/2>e.x&&proj.x-proj.w/2<e.x+e.w&&proj.y>e.y&&proj.y<e.y+e.h){
        e.dead=true;proj.life=0;g.score+=200;burst(e.x+e.w/2,e.y+e.h/2,'#88bbdd',10,5);SFX.kill();
      }
    }
  }
  // Player vs enemies
  for(const e of enemyList){
    if(e.dead)continue;
    const mg=e instanceof FlyEnemy?2:4;
    if(player.x+player.w>e.x+mg&&player.x<e.x+e.w-mg&&player.y+player.h>e.y+mg&&player.y<e.y+e.h-mg){
      const topHit=player.vy>0&&player.y+player.h<e.y+e.h*(e instanceof FlyEnemy?0.6:0.55);
      if(topHit||(player.sliding&&Math.abs(player.vx)>2)){
        e.dead=true;player.vy=topHit?-11:-4;
        const pts=e instanceof FlyEnemy?200:(e.type==='bear'?300:150);
        g.score+=player.isEmperor?pts*2:pts;
        burst(e.x+e.w/2,e.y+e.h/2,e instanceof FlyEnemy?'#88bbdd':'#ffaa44',10,5);SFX.kill();
      } else {player.takeHit();}
    }
  }
  // Player vs coins
  for(const c of coinList){
    if(c.got)continue;
    if(player.x+player.w>c.x-9&&player.x<c.x+9&&player.y+player.h>c.y-11&&player.y<c.y+11){
      c.got=true;g.score+=50;g.coins++;burst(c.x,c.y,'#ffd700',7,3);SFX.coin();
      // 1-UP check
      if(Math.floor(g.coins/COIN_1UP)>g.coinMilestone){
        g.coinMilestone=Math.floor(g.coins/COIN_1UP);g.lives++;
        popups.push(new TextPop(player.x+player.w/2,player.y-20,'1UP!! 🐧','#00ffaa',20));
        burst(player.x+player.w/2,player.y,'#00ffaa',20,6);SFX.oneup();
      }
    }
  }
  // Player vs stars
  for(const s of starList){
    if(s.got)continue;
    if(player.x+player.w>s.x-13&&player.x<s.x+13&&player.y+player.h>s.y-13&&player.y<s.y+13){
      s.got=true;g.score+=500;g.stars++;starBurst(s.x,s.y);SFX.star();
    }
  }
  // Player vs power-up (Emperor Crown)
  for(const m of powerUpList){
    if(m.got)continue;
    if(player.x+player.w>m.x-18&&player.x<m.x+18&&player.y+player.h>m.y-26&&player.y<m.y+26){
      m.got=true;
      if(!player.isEmperor){
        player.power='emperor';player.w=34;player.h=40;player.transformT=60;
        g.score+=1000;
        emperorBurst(player.x+player.w/2,player.y+player.h/2);
        popups.push(new TextPop(player.x+player.w/2,player.y-20,'👑 EMPEROR!! +1000','#ffd700',18));
        SFX.powerup();
      } else {
        // Already emperor: score bonus
        g.score+=500;popups.push(new TextPop(player.x+player.w/2,player.y,'CROWN BONUS +500','#ffd700',14));SFX.star();
      }
    }
  }
  // Goal gate
  if(goalGate&&!goalGate.triggered){
    const gx=goalGate.triggerX,gy=goalGate.triggerY;
    if(player.x+player.w>gx&&player.x<gx+goalGate.triggerW&&player.y+player.h>gy&&player.y<gy+goalGate.triggerH){
      goalGate.triggered=true;player.won=true;triggerGoal();
    }
  }
}

// ════════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════════
function loop(){
  requestAnimationFrame(loop);ctx.clearRect(0,0,W,H);

  if(g.state==='TITLE'){
    drawTitle();
    if(inp.jump()||inp.restart()||consumeTap()){
      bgmInit();startStage(0,true);
    }
    return;
  }
  if(g.state==='GAMEOVER'){
    drawGameOver();
    if(inp.restart()||consumeTap()){startStage(g.stageIdx,true);}
    return;
  }
  if(g.state==='STAGECLEAR'){
    drawBG(STAGES[g.stageIdx].bg);drawStageClear(g.stageIdx);
    if(inp.jump()||inp.restart()||consumeTap()){if(g.stageIdx<STAGES.length-1)startStage(g.stageIdx+1,false);else g.state='ALLCLEAR';}
    return;
  }
  if(g.state==='ALLCLEAR'){
    bgmStop();drawAllClear();
    if(inp.restart()||consumeTap()){bgmPlaying=false;g.state='TITLE';}
    return;
  }

  // ─── PLAYING ──────────────────────────────────
  const st=STAGES[g.stageIdx];
  updateJoyJump();
  g.timer++;if(g.timer>=g.timeMax&&!player.won)player.alive=false;

  if(!player.won)player.tick();
  camUpdate(player.x+player.w/2,player.y+player.h/2);
  enemyList.forEach(e=>e.tick());coinList.forEach(c=>c.tick());starList.forEach(s=>s.tick());
  powerUpList.forEach(m=>m.tick());
  for(let i=projectiles.length-1;i>=0;i--){projectiles[i].tick();if(projectiles[i].life<=0)projectiles.splice(i,1);}
  if(goalGate)goalGate.tick();
  checkEntities();
  if(goalAnim.active)tickGoalAnim();
  tickIntro();
  for(let i=parts.length-1;i>=0;i--){parts[i].tick();if(parts[i].life<=0)parts.splice(i,1);}
  for(let i=popups.length-1;i>=0;i--){popups[i].tick();if(popups[i].life<=0)popups.splice(i,1);}
  if(!player.alive&&g.state==='PLAYING'){bgmStop();g.state='GAMEOVER';}

  // ─── DRAW ──────────────────────────────────────
  drawBG(st.bg);
  const sc=Math.max(0,Math.floor(cam.x/T)-1),ec=Math.min(COLS,Math.ceil((cam.x+W)/T)+1);
  const sr=Math.max(0,Math.floor(cam.y/T)-1),er=Math.min(ROWS,Math.ceil((cam.y+H)/T)+1);
  for(let r=sr;r<er;r++)for(let c=sc;c<ec;c++)drawTile(c,r,cam.x,cam.y,st.bg);
  if(goalGate)goalGate.draw(cam.x,cam.y);
  powerUpList.forEach(m=>m.draw(cam.x,cam.y));
  coinList.forEach(c=>c.draw(cam.x,cam.y));
  starList.forEach(s=>s.draw(cam.x,cam.y));
  enemyList.forEach(e=>e.draw(cam.x,cam.y));
  projectiles.forEach(p=>p.draw(cam.x,cam.y));
  player.draw(cam.x,cam.y);
  parts.forEach(p=>p.draw(cam.x,cam.y));
  popups.forEach(p=>p.draw(cam.x,cam.y));
  drawHUD(g.stageIdx);
  drawGoalAnim();
  drawIntro(g.stageIdx);

  if(!goalAnim.active&&inp.restart())startStage(g.stageIdx,true);
}
loop();
</script>
