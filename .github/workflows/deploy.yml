name: deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Debug
        run: ls -R   # ← 追加（確認用）

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Generate
        run: node ./scripts/generate.js   # ← 明示的に指定

      - name: Check output
        run: cat data/games.json   # ← 確認用

      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .